{% extends 'expenses/base.html' %}

{% block content %}
<div class="flex justify-center items-center min-h-[50vh]">
    <div class="glass p-8 rounded-3xl max-w-md w-full text-center border-red-500/30">
        <h2 class="text-2xl font-bold text-red-400 mb-4">Delete Expense?</h2>
        <p class="text-gray-400 mb-8">Are you sure you want to delete <span class="text-white font-bold">"{{ expense.title }}"</span>? This action cannot be undone.</p>
        
        <form method="post" class="flex gap-4">
            {% csrf_token %}
            <button type="submit" class="flex-1 bg-red-600 hover:bg-red-700 p-3 rounded-xl font-bold transition">
                Yes, Delete
            </button>
            <a href="{% url 'dashboard' %}" class="flex-1 bg-white/10 hover:bg-white/20 p-3 rounded-xl font-bold transition">
                Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}
