{% extends 'expenses/base.html' %}

{% block content %}
<div class="flex justify-center items-center min-h-[60vh]">
    <div class="soft-card p-10 rounded-[2.5rem] max-w-md w-full text-center border-t-4 border-t-red-500 shadow-2xl shadow-red-100 bg-white">
        
        <div class="bg-red-50 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        </div>

        <h2 class="text-2xl font-extrabold text-slate-900 mb-2">Confirm Deletion</h2>
        <p class="text-slate-500 mb-8 px-4">
            Are you sure you want to remove <span class="text-slate-900 font-bold">"{{ expense.title }}"</span>? This will permanently delete the record from your balance.
        </p>
        
        <form method="post" class="flex flex-col gap-3">
            {% csrf_token %}
            <button type="submit" class="w-full bg-red-500 hover:bg-red-600 text-white p-4 rounded-2xl font-bold transition-all shadow-lg shadow-red-200">
                Yes, Delete Permanently
            </button>
            <a href="{% url 'expense' %}" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 p-4 rounded-2xl font-bold transition-all text-center">
                No, Keep it
            </a>
        </form>
    </div>
</div>

<style>
    /* Adding a subtle pulse to the shadow for extra "Danger" emphasis */
    .shadow-red-200 {
        animation: pulse-red 2s infinite;
    }
    @keyframes pulse-red {
        0% { shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.2); }
        50% { shadow: 0 20px 25px -5px rgba(239, 68, 68, 0.4); }
        100% { shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.2); }
    }
</style>
{% endblock %}
