{% extends 'expenses/base.html' %}

{% block content %}
<div class="flex justify-center items-center min-h-[70vh]">
    <div class="soft-card p-10 rounded-[2.5rem] w-full max-w-md bg-white shadow-xl shadow-slate-200/60 border border-slate-100">
        <h2 class="text-3xl font-extrabold mb-2 text-center text-slate-900">Welcome Back</h2>
        <p class="text-slate-500 text-sm text-center mb-8">Login to manage your business expenses.</p>
        
        <form method="post" class="space-y-5">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Username</label>
                <input type="text" 
                       name="username" 
                       autocomplete="off"
                       required
                       class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-500/10 transition-all duration-200">
            </div>
            
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Password</label>
                <input type="password" 
                       name="password" 
                       required
                       class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-500/10 transition-all duration-200">
            </div>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-2xl font-bold transition-all shadow-lg shadow-blue-200 mt-6">
                Login to SpentWise
            </button>
        </form>
        
        <p class="text-center mt-8 text-slate-500 text-sm font-medium">
             New here? <a href="{% url 'signup' %}" class="text-blue-600 hover:text-blue-700 font-bold transition">Create an account</a>
        </p>
    </div>
</div>
{% endblock %}
