{% extends 'expenses/base.html' %}

{% block content %}
<div class="max-w-xl mx-auto py-8">
    <a href="{% url 'dashboard' %}" class="flex items-center text-slate-500 hover:text-slate-900 font-bold transition group">
                <span class="bg-white p-2 rounded-lg shadow-sm border border-slate-200 mr-3 group-hover:scale-110 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </span>
                Back
            </a>
    <div class="mb-8 text-center">
        <h2 class="text-3xl font-extrabold text-slate-900">Add New Expense</h2>
        <p class="text-slate-500 mt-2">Enter the details of your transaction below.</p>
    </div>

    <div class="soft-card px-10 py-7 rounded-[2.5rem] bg-white shadow-xl shadow-slate-200/60 border border-slate-100">
        <form method="post" class="space-y-6">
            {% csrf_token %}

            {% for field in form %}
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">
                        {{ field.label }}
                    </label>
                    <div class="relative">
                        {{ field }}
                    </div>
                    {% if field.errors %}
                        <p class="text-red-500 text-xs mt-2 font-medium ml-1">
                            {{ field.errors.0 }}
                        </p>
                    {% endif %}
                </div>
            {% endfor %}

            <div class="grid grid-cols-2 gap-4 pt-6">
                <button type="submit" 
                    class="bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-2xl font-bold transition-all shadow-lg shadow-blue-200 flex justify-center items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                    Save
                </button>
                <a href="{% url 'dashboard' %}" 
                    class="bg-slate-100 hover:bg-slate-200 text-slate-600 p-4 rounded-2xl font-bold text-center transition-all">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<style>
    /* Since Django renders {{ field }} as a raw input, 
       this CSS ensures the fields look modern even without 
       editing forms.py widgets every time.
    */
    input, select, textarea {
        width: 100%;
        background-color: #f8fafc !important; /* slate-50 */
        border: 1px solid #e2e8f0 !important; /* slate-200 */
        border-radius: 1rem !important; /* rounded-2xl */
        padding: 0.875rem 1rem !important;
        color: #0f172a !important; /* slate-900 */
        font-size: 1rem;
        transition: all 0.2s;
    }
    input:focus, select:focus, textarea:focus {
        outline: none !important;
        border-color: #3b82f6 !important; /* blue-500 */
        background-color: #ffffff !important;
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1) !important;
    }
</style>
{% endblock %}
