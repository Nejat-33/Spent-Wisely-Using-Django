{% extends 'expenses/base.html' %}

{% block content %}
<div class="max-w-xl mx-auto py-16">
    <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 text-blue-600 rounded-3xl mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
            </svg>
        </div>
        <h2 class="text-3xl font-black text-slate-900">Set Monthly Budget</h2>
        <p class="text-slate-500 mt-2">How much do you plan to spend in <span class="font-bold text-blue-600">{{ month_name }} {{ year }}</span>?</p>
    </div>

    <div class="soft-card bg-white p-10 rounded-[3rem] shadow-2xl shadow-blue-100 border border-slate-50">
        <form method="POST" class="space-y-8">
            {% csrf_token %}
            
            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-6 flex items-center text-slate-400 text-2xl font-bold">$</span>
                <input type="number" name="amount" step="0.01" value="{{ budget.amount }}"
                    class="w-full bg-slate-50 border-2 border-slate-100 rounded-3xl py-6 pl-12 pr-6 text-3xl font-black text-slate-900 focus:outline-none focus:border-blue-500 focus:bg-white transition-all tracking-tight"
                    placeholder="0.00">
            </div>

            <div class="bg-blue-50 rounded-2xl p-4 flex gap-4 items-center">
                <div class="bg-blue-100 p-2 rounded-xl text-blue-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                    </svg>
                </div>
                <p class="text-xs text-blue-800 font-medium">Setting a budget helps us calculate your "Remaining Balance" on the main dashboard.</p>
            </div>

            <div class="grid grid-cols-1 gap-3">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl font-bold text-lg shadow-xl shadow-blue-200 transition-all active:scale-[0.98]">
                    Save Budget Plan
                </button>
                <a href="{% url 'dashboard' %}" class="w-full text-center text-slate-400 hover:text-slate-600 font-semibold py-2 transition-all">
                    Back to Dashboard
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
