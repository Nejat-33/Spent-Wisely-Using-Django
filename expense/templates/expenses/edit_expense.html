{% extends 'expenses/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="glass p-8 rounded-3xl shadow-2xl">
        <h2 class="text-3xl font-bold mb-6">Add New Expense</h2>
        
        <form method="post" class="space-y-6">
            {% csrf_token %}

            {% for field in form %}
                <div>
                    <label class="block text-sm text-gray-400 mb-2">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                       <p class="text-red-400 text-xs mt-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
            {% endfor %}
            <div>
                <button type="submit"
                class="flex-1 bg-blue-600 hover:bg-blue-700 p-4 rounded-2xl font-bold transition">
                    Save Expense
                </button>
                <a href="{% url 'dashboard' %}"
                 class="flex-1 bg-white/10 hover:bg-white/20 p-4 rounded-2xl font-bold text-center transition"
                >Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
