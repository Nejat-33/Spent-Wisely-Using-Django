{% extends 'expenses/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto py-5">
    <a href="{% url 'expense' %}" class="flex items-center text-slate-500 hover:text-slate-900 font-bold transition group">
                <span class="bg-white p-2 rounded-lg shadow-sm border border-slate-200 mr-3 group-hover:scale-110 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </span>
                Back
            </a>
    <div class="mb-6 text-center">
        <h2 class="text-3xl font-extrabold text-slate-900">Edit Expense</h2>
        <p class="text-slate-500 mt-2">Adjust the details for <span class="font-bold text-blue-600">"{{ expense.title }}"</span></p>
    </div>

    <div class="soft-card px-10 py-7 rounded-[2.5rem] bg-white border border-slate-100 shadow-xl shadow-slate-200/50">
        <form method="post" class="space-y-4">
            {% csrf_token %}

            {% for field in form %}
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">
                        {{ field.label }}
                    </label>
                    <div class="form-input-container">
                        {{ field }}
                    </div>
                    {% if field.errors %}
                        <p class="text-red-500 text-xs mt-2 font-medium ml-1">
                            {{ field.errors.0 }}
                        </p>
                    {% endif %}
                </div>
            {% endfor %}

            <div class="grid grid-cols-2 gap-4 pt-6">
                <button type="submit" 
                    class="bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-2xl font-bold transition-all shadow-lg shadow-blue-200">
                    Update
                </button>
                <a href="{% url 'dashboard' %}" 
                    class="bg-slate-100 hover:bg-slate-200 text-slate-600 p-4 rounded-2xl font-bold text-center transition-all">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<style>
    /* Modern Input Styling for Django Fields */
    input, select, textarea {
        width: 100%;
        background-color: #f8fafc !important; /* slate-50 */
        border: 1px solid #e2e8f0 !important; /* slate-200 */
        border-radius: 1rem !important;
        padding: 0.875rem 1rem !important;
        color: #0f172a !important;
        transition: all 0.2s ease-in-out;
    }
    input:focus, select:focus, textarea:focus {
        outline: none !important;
        border-color: #3b82f6 !important;
        background-color: #ffffff !important;
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1) !important;
    }
</style>
{% endblock %}
